# Render.com Free Tier: 15 dakika inaktivitede uyku moduna geçer.
# Bu workflow her 10 dakikada bir /api/health'e ping atarak sunucuyu uyanık tutar.
name: Render Keep-Alive

on:
  schedule:
    # Her 10 dakikada bir (cron: dakika saat gün ay hafta)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Manuel tetikleme

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
            https://depremanaliz.onrender.com/api/health
        continue-on-error: true
